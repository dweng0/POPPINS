# poppins.yml — Framework configuration
# BDD.md defines WHAT to build. This file defines HOW to build it.

orchestration:
  # Maximum number of parallel worker agents (each gets its own worktree)
  max_parallel_agents: 1

  # Number of sequential rounds to run (each round spawns max_parallel_agents workers)
  max_rounds: 1

  # LLM provider for the scenario ordering call
  # Options: anthropic | openai | groq | ollama | moonshot | dashscope | custom
  provider: custom

  # Base URL for custom provider
  #  base_url: https://coding-intl.dashscope.aliyuncs.com/v1
  base_url: http://192.168.1.112:1234/v1
  # Model used for the orchestrator's scenario ordering call
  #  model_orchestrator: qwen3.5-plus

  model_orchestrator: google/gemma-4-e4b
  # Base URL — required for ollama/custom, ignored for anthropic/openai/groq
  # base_url: http://localhost:11434

  # API key — optional, falls back to provider env var (ANTHROPIC_API_KEY etc.)
  # api_key: sk-...

agent:
  # LLM provider for worker agents
  # Options: anthropic | openai | groq | ollama | moonshot | dashscope | custom
  provider: custom

  # Base URL for custom provider
  base_url: http://192.168.1.112:1234/v1

  # Default model (overridden by --model flag or MODEL env var)
  #  default_model: qwen3.5-plus

  default_model: google/gemma-4-e4b

  # Base URL — required for ollama/custom, ignored for anthropic/openai/groq
  # base_url: http://localhost:11434

  # API key — optional, falls back to provider env var (ANTHROPIC_API_KEY etc.)
  # api_key: sk-...

  # Maximum iterations per agent session (tool-call rounds)
  max_iterations: 75

  # Iteration at which wrap-up reminder is injected
  wrap_up_at: 70

  # Maximum tokens per LLM response
  max_tokens_per_response: 8192

  # Maximum characters returned from a single tool call
  tool_output_limit: 12000

  # Session timeout in seconds
  session_timeout: 3600

  # Context window management — when estimated token count exceeds this,
  # older tool results are summarized to free space
  context_window_limit: 100000
